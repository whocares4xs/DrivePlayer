<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#000000"/>
<title>DrivePlayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #000;
    --surface: #0a0a0a;
    --surface2: #111;
    --surface3: #1a1a1a;
    --border: #222;
    --accent: #e8c97a;
    --accent2: #c4a45a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'DM Sans', sans-serif; color:var(--text); }

  /* ─── SCREENS ─── */
  .screen { position:absolute; inset:0; display:none; flex-direction:column; background:var(--bg); }
  .screen.active { display:flex; }

  /* ─── AUTH / LOADING SCREEN ─── */
  #auth-screen {
    align-items:center; justify-content:center; gap:28px;
    background: radial-gradient(ellipse at 50% 30%, #1a1500 0%, #000 70%);
  }
  .auth-logo { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .auth-logo svg { width:64px; height:64px; }
  .auth-title { font-family:'DM Serif Display',serif; font-size:32px; letter-spacing:-0.5px; color:var(--accent); }
  .auth-sub { font-size:12px; color:var(--text2); letter-spacing:2px; text-transform:uppercase; }
  /* Loading spinner shown during auto-sign-in attempt */
  .auth-spinner {
    width:36px; height:36px; border-radius:50%;
    border:2px solid #1a1a1a; border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  .auth-status {
    font-size:13px; color:var(--text3); text-align:center;
    min-height:18px; transition:color 0.3s;
  }
  /* Fallback manual sign-in button — hidden until needed */
  .auth-btn {
    display:none; align-items:center; gap:12px;
    background:var(--accent); color:#000; border:none; border-radius:50px;
    padding:14px 28px; font-size:15px; font-weight:600; cursor:pointer;
    font-family:'DM Sans',sans-serif; letter-spacing:0.3px;
    box-shadow:0 0 40px rgba(232,201,122,0.3);
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .auth-btn.visible { display:flex; }
  .auth-btn:active { transform:scale(0.96); }
  /* GIS One Tap container positioning */
  #g_id_onload { position:fixed; top:60px; right:12px; z-index:9999; }

  /* ─── SCAN SCREEN ─── */
  #scan-screen { align-items:center; justify-content:center; gap:24px; }
  .scan-ring {
    width:80px; height:80px; border-radius:50%;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .scan-label { font-size:14px; color:var(--text2); text-align:center; max-width:260px; line-height:1.6; }
  .scan-progress { font-size:28px; font-family:'DM Serif Display',serif; color:var(--accent); }
  .scan-detail { font-size:11px; color:var(--text3); max-width:280px; text-align:center; word-break:break-all; }

  /* ─── LIBRARY SCREEN ─── */
  #library-screen { background:var(--bg); }
  .lib-header {
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    padding:56px 16px 12px; background:var(--bg);
    border-bottom:1px solid var(--border);
    gap:0;
  }
  .lib-header-left  { display:flex; align-items:center; gap:6px; justify-content:flex-start; min-width:0; }
  .lib-header-center{ display:flex; align-items:center; justify-content:center; }
  .lib-header-right { display:flex; align-items:center; gap:4px; justify-content:flex-end; }
  .lib-title { font-family:'DM Serif Display',serif; font-size:24px; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lib-tabs {
    display:flex; gap:4px; padding:10px 16px;
    border-bottom:1px solid var(--border); background:var(--bg);
  }
  .lib-tab {
    flex:1; padding:8px 0; text-align:center; font-size:12px; font-weight:500;
    color:var(--text2); border-radius:8px; cursor:pointer; letter-spacing:0.5px;
    text-transform:uppercase; transition:all 0.2s;
  }
  .lib-tab.active { background:var(--surface3); color:var(--accent); }
  .lib-list { flex:1; overflow-y:auto; }
  .lib-item {
    display:flex; align-items:center; gap:14px;
    padding:12px 20px; border-bottom:1px solid #111; cursor:pointer;
    transition:background 0.15s;
  }
  .lib-item:active { background:var(--surface2); }
  .lib-item-art {
    width:46px; height:46px; border-radius:6px; background:var(--surface3);
    object-fit:cover; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:18px; overflow:hidden;
  }
  .lib-item-art img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
  .lib-item-info { flex:1; min-width:0; }
  .lib-item-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lib-item-sub { font-size:12px; color:var(--text2); margin-top:2px; }
  .lib-item-meta { font-size:11px; color:var(--text3); }

  /* ─── BROWSE SCREEN (Artist/Album drill-down) ─── */
  #browse-screen { background:var(--bg); }
  .browse-header {
    display:flex; align-items:center; gap:12px;
    padding:52px 16px 12px; background:var(--bg);
    border-bottom:1px solid var(--border);
  }
  .browse-back {
    width:36px; height:36px; border-radius:50%; background:var(--surface2);
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .browse-title { font-size:17px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .browse-subtitle { font-size:12px; color:var(--text2); }
  .browse-hero {
    display:flex; flex-direction:column; align-items:center;
    padding:24px 20px 16px; gap:12px; background:var(--surface);
  }
  .browse-hero-art {
    width:140px; height:140px; border-radius:10px; background:var(--surface3);
    object-fit:cover; display:flex; align-items:center; justify-content:center;
    font-size:48px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.6);
  }
  .browse-hero-art img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
  .browse-hero-name { font-family:'DM Serif Display',serif; font-size:22px; text-align:center; }
  .browse-hero-sub { font-size:12px; color:var(--text2); }
  .browse-actions { display:flex; gap:10px; }
  .browse-btn {
    display:flex; align-items:center; gap:6px;
    padding:9px 18px; border-radius:50px; border:none; cursor:pointer;
    font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif;
    transition:transform 0.15s;
  }
  .browse-btn:active { transform:scale(0.95); }
  .browse-btn.primary { background:var(--accent); color:#000; }
  .browse-btn.secondary { background:var(--surface3); color:var(--text); }
  .browse-list { flex:1; overflow-y:auto; }
  .browse-item {
    display:flex; align-items:center; gap:14px;
    padding:12px 20px; border-bottom:1px solid #111; cursor:pointer;
    transition:background 0.15s;
  }
  .browse-item:active { background:var(--surface2); }
  .browse-item-num { width:24px; text-align:center; font-size:13px; color:var(--text3); flex-shrink:0; }
  .browse-item-art {
    width:42px; height:42px; border-radius:5px; background:var(--surface3);
    object-fit:cover; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:16px; overflow:hidden;
  }
  .browse-item-art img { width:100%; height:100%; object-fit:cover; }
  .browse-item-info { flex:1; min-width:0; }
  .browse-item-name { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .browse-item-sub { font-size:12px; color:var(--text2); margin-top:2px; }
  .browse-item-dur { font-size:12px; color:var(--text3); flex-shrink:0; }
  .browse-item-fav {
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; color:var(--text3); transition:color 0.2s;
  }
  .browse-item-fav.active { color:#e05555; }

  /* ─── PLAYER SCREEN ─── */
  #player-screen { background:#000; position:relative; overflow:hidden; }
  .player-bg {
    position:absolute; inset:-20px; background-size:cover; background-position:center;
    filter:blur(40px) brightness(0.25) saturate(1.5);
    transition:background-image 0.8s ease; z-index:0;
  }
  .player-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.95) 100%); z-index:1; }

  /* Top bar */
  .player-top {
    position:relative; z-index:10;
    display:flex; align-items:center; gap:8px;
    padding:52px 16px 12px;
  }
  .player-top-btn {
    width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.08);
    border:none; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text); backdrop-filter:blur(10px);
    transition:background 0.2s;
  }
  .player-top-btn:active { background:rgba(255,255,255,0.15); }
  .player-top-btn.active { color:var(--accent); background:rgba(232,201,122,0.12); }
  .player-top-spacer { flex:1; }
  .player-context { flex:1; text-align:center; }
  .player-context-label { font-size:10px; color:var(--text2); letter-spacing:1.5px; text-transform:uppercase; }
  .player-context-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Album art */
  .player-art-wrap {
    position:relative; z-index:10; flex:1;
    display:flex; align-items:center; justify-content:center;
    padding:0 40px;
  }
  .player-art {
    width:100%; max-width:320px; aspect-ratio:1;
    border-radius:16px; background:var(--surface3);
    object-fit:cover; display:flex; align-items:center; justify-content:center;
    font-size:72px; overflow:hidden;
    box-shadow:0 16px 64px rgba(0,0,0,0.8);
    transition:transform 0.3s ease, opacity 0.3s ease;
  }
  .player-art.transitioning { transform:scale(0.95); opacity:0.5; }
  .player-art img { width:100%; height:100%; object-fit:cover; border-radius:16px; }

  /* Track info */
  .player-info {
    position:relative; z-index:10;
    padding:20px 24px 8px;
    display:flex; align-items:center; gap:12px;
  }
  .player-info-text { flex:1; min-width:0; }
  .player-track { font-family:'DM Serif Display',serif; font-size:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-artist { font-size:14px; color:var(--text2); margin-top:3px; }
  .player-fav-btn {
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text3); transition:color 0.2s, transform 0.15s; flex-shrink:0;
  }
  .player-fav-btn:active { transform:scale(0.85); }
  .player-fav-btn.active { color:#e05555; }

  /* Progress */
  .player-progress { position:relative; z-index:10; padding:4px 24px 8px; }
  .progress-bar-wrap {
    position:relative; height:3px; background:rgba(255,255,255,0.12);
    border-radius:3px; cursor:pointer; touch-action:none;
  }
  .progress-bar-fill {
    height:100%; background:var(--accent); border-radius:3px;
    transition:width 0.5s linear; width:0%;
  }
  .progress-thumb {
    position:absolute; top:50%; right:0; transform:translate(50%,-50%);
    width:12px; height:12px; border-radius:50%; background:var(--accent);
    opacity:0; transition:opacity 0.2s; pointer-events:none;
  }
  .progress-bar-wrap:active .progress-thumb, .progress-bar-wrap.dragging .progress-thumb { opacity:1; }
  .progress-times { display:flex; justify-content:space-between; margin-top:6px; font-size:11px; color:var(--text3); }

  /* Controls */
  .player-controls {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 24px 12px;
  }
  .ctrl-btn {
    width:44px; height:44px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text2); border:none; background:none;
    transition:color 0.2s, transform 0.15s;
  }
  .ctrl-btn:active { transform:scale(0.88); }
  .ctrl-btn.active { color:var(--accent); }
  .ctrl-play {
    width:64px; height:64px; border-radius:50%;
    background:var(--accent); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#000;
    box-shadow:0 0 24px rgba(232,201,122,0.35);
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .ctrl-play:active { transform:scale(0.92); box-shadow:0 0 12px rgba(232,201,122,0.2); }

  /* Queue strip */
  .player-queue-strip {
    position:relative; z-index:10;
    padding:8px 0 calc(8px + var(--safe-bottom));
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .queue-strip-scroll { display:flex; gap:10px; overflow-x:auto; padding:4px 20px; scrollbar-width:none; }
  .queue-strip-scroll::-webkit-scrollbar { display:none; }
  .queue-chip {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    flex-shrink:0; cursor:pointer; opacity:0.5; transition:opacity 0.2s;
  }
  .queue-chip.current { opacity:1; }
  .queue-chip-art {
    width:36px; height:36px; border-radius:5px; background:var(--surface3);
    overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .queue-chip-art img { width:100%; height:100%; object-fit:cover; }
  .queue-chip-name { font-size:9px; color:var(--text2); max-width:48px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .queue-chip.current .queue-chip-name { color:var(--accent); }

  /* ─── MODAL ─── */
  .modal-overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.active { display:flex; }
  .modal-sheet {
    background:var(--surface); border-radius:20px 20px 0 0;
    width:100%; max-width:480px; padding:20px 0;
    border-top:1px solid var(--border);
    animation:slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-handle { width:36px; height:3px; background:var(--border); border-radius:3px; margin:0 auto 20px; }
  .modal-title { font-size:14px; font-weight:600; color:var(--text2); padding:0 20px 12px; letter-spacing:0.5px; text-transform:uppercase; }
  .modal-item {
    display:flex; align-items:center; gap:14px;
    padding:14px 20px; cursor:pointer; transition:background 0.15s;
  }
  .modal-item:active { background:var(--surface2); }
  .modal-item-icon { width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:var(--accent); }
  .modal-item-label { font-size:15px; }
  .modal-item-sub { font-size:12px; color:var(--text2); margin-top:2px; }

  /* ─── TOAST ─── */
  .toast {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface3); color:var(--text); padding:10px 20px;
    border-radius:50px; font-size:13px; z-index:200; opacity:0;
    transition:opacity 0.2s, transform 0.2s; pointer-events:none; white-space:nowrap;
    border:1px solid var(--border);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ─── MINI PLAYER BANNER ─── */
  #mini-player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 90;
    display: none; /* shown via JS when music plays outside player screen */
    flex-direction: column;
    background: rgba(10,10,10,0.97);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #mini-player.visible { display: flex; }
  .mini-progress {
    height: 2px;
    background: var(--surface3);
    width: 100%;
  }
  .mini-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.5s linear;
  }
  .mini-body {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px 10px;
    cursor: pointer;
  }
  .mini-art {
    width: 40px; height: 40px;
    border-radius: 6px;
    background: var(--surface3);
    flex-shrink: 0;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .mini-art img { width: 100%; height: 100%; object-fit: cover; }
  .mini-info { flex: 1; min-width: 0; }
  .mini-title {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .mini-artist {
    font-size: 11px; color: var(--text2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
  }
  .mini-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .mini-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; cursor: pointer;
    color: var(--text2); border-radius: 50%;
    transition: color 0.15s, background 0.15s;
  }
  .mini-btn:active { background: var(--surface2); color: var(--text); }
  .mini-play-btn {
    width: 36px; height: 36px;
    background: var(--accent); border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #000;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .mini-play-btn:active { transform: scale(0.9); }

  /* push scrollable list content up when banner is visible */
  .has-mini-player .lib-list,
  .has-mini-player .browse-list { padding-bottom: 68px; }

  /* ─── LIBRARY SHUFFLE MASTER BTN ─── */
  .lib-shuffle-all-btn {
    height: 34px;
    padding: 0 20px;
    border-radius: 100px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(232,201,122,0.3);
  }
  .lib-shuffle-all-btn:active { transform: scale(0.95); }

  /* ─── MULTI-DELETE SELECT MODE ─── */
  .lib-item.delete-selected { background:rgba(224,85,85,0.12); }
  .delete-select-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:95;
    background:rgba(224,85,85,0.95); backdrop-filter:blur(12px);
    display:none; align-items:center; gap:12px;
    padding:14px 20px calc(14px + var(--safe-bottom,0px));
  }
  .delete-select-bar.active { display:flex; }
  .dsb-count { flex:1; font-size:14px; font-weight:600; color:#fff; }
  .dsb-btn {
    padding:9px 18px; border-radius:50px; border:none; cursor:pointer;
    font-size:13px; font-weight:700; font-family:'DM Sans',sans-serif;
  }
  .dsb-delete { background:#fff; color:#e05555; }
  .dsb-cancel { background:rgba(255,255,255,0.2); color:#fff; }

  /* ─── SCROLLBARS ─── */
  .lib-list::-webkit-scrollbar, .browse-list::-webkit-scrollbar { width:2px; }
  .lib-list::-webkit-scrollbar-track, .browse-list::-webkit-scrollbar-track { background:transparent; }
  .lib-list::-webkit-scrollbar-thumb, .browse-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* ─── FULLSCREEN ─── */
  #player-screen.fullscreen .player-art { max-width:none; width:calc(100vw - 48px); }

  /* ─── LOADING OVERLAY ─── */
  .loading-indicator {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    width:24px; height:24px; z-index
